<!DOCTYPE html><html><head><meta charset="UTF-8"><style>
  *{margin:0;box-sizing:border-box;}
  :root{--sand:#ECE3CF;--avocado:#8FA659;--orange:#C8552E;--teal:#2E7B86;--mustard:#E0A52E;--ink:#3A352C;--paper:#F8F3E6;}
  html,body{width:1200px;height:630px;}
  body{background:radial-gradient(120% 130% at 65% 0%,#F2EAD8 0%,var(--sand) 60%,#E3D8BE 100%);
    font-family:"Futura","Century Gothic","Avenir Next","Hiragino Kaku Gothic ProN",sans-serif;
    color:var(--ink);overflow:hidden;position:relative;}
  .left{position:absolute;left:72px;top:118px;width:560px;}
  .knob{display:inline-block;width:26px;height:26px;border-radius:50%;background:var(--avocado);
    border:5px solid var(--ink);vertical-align:middle;margin-right:18px;}
  .kick{font-size:20px;letter-spacing:.5em;font-weight:700;color:var(--avocado);text-transform:uppercase;}
  h1{font-size:104px;letter-spacing:.04em;font-weight:700;text-transform:uppercase;line-height:.95;margin:22px 0 0;}
  .jp{font-size:40px;font-weight:700;margin-top:26px;letter-spacing:.04em;}
  .sub{font-size:23px;font-weight:700;color:#6E8443;margin-top:20px;letter-spacing:.06em;}
  .tags{margin-top:34px;display:flex;gap:12px;}
  .tag{font-size:18px;font-weight:700;border:3px solid var(--ink);border-radius:30px;padding:9px 20px;background:var(--paper);}
  #loop{position:absolute;right:18px;top:0;}
</style></head><body>
  <svg id="loop" width="600" height="630" viewBox="0 0 600 630"></svg>
  <div class="left">
    <div><span class="knob"></span><span class="kick">Rail&nbsp;Radar</span></div>
    <h1>Rail<br>Radar</h1>
    <div class="jp">山手線を、リアルタイムに。</div>
    <div class="sub">a mid-century transit tracker</div>
    <div class="tags"><span class="tag">外回り / 内回り</span><span class="tag">実時刻連動</span></div>
  </div>
<script>
  const cx=330, cy=315, R=250, n=30;
  const hubs=new Set([0,4,12,16,19,24]);   // 東京/上野/池袋/新宿/渋谷/品川
  let dots='', hubsvg='', trains='';
  for(let i=0;i<n;i++){
    const a=-Math.PI/2+i/n*2*Math.PI, x=cx+R*Math.cos(a), y=cy+R*Math.sin(a);
    if(hubs.has(i)) hubsvg+=`<rect x="${x-13}" y="${y-13}" width="26" height="26" rx="5"/>`;
    else dots+=`<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="11"/>`;
  }
  [{i:3,c:'#C8552E'},{i:9,c:'#2E7B86'},{i:15,c:'#C8552E'},{i:21,c:'#2E7B86'},{i:27,c:'#C8552E'}].forEach(t=>{
    const a=-Math.PI/2+(t.i+0.5)/n*2*Math.PI, x=cx+R*Math.cos(a), y=cy+R*Math.sin(a), deg=a*180/Math.PI+90;
    trains+=`<rect x="${(x-21).toFixed(1)}" y="${(y-12).toFixed(1)}" width="42" height="24" rx="8" fill="${t.c}" transform="rotate(${deg.toFixed(1)} ${x.toFixed(1)} ${y.toFixed(1)})"/>`;
  });
  document.getElementById('loop').innerHTML=
    `<circle cx="${cx}" cy="${cy+7}" r="${R}" fill="none" stroke="rgba(58,53,44,.10)" stroke-width="26"/>`+
    `<circle cx="${cx}" cy="${cy}" r="${R}" fill="none" stroke="#8FA659" stroke-width="26"/>`+
    `<g fill="#F8F3E6" stroke="#3A352C" stroke-width="7">${dots}${hubsvg}</g>`+
    `<g stroke="rgba(58,53,44,.85)" stroke-width="3">${trains}</g>`;
</script>
</body></html>
